<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-surface: #12121a;
            --bg-elevated: #1a1a25;
            --bg-glass: rgba(18, 18, 26, 0.7);
            --accent-primary: #00d4aa;
            --accent-secondary: #00a8ff;
            --accent-glow: rgba(0, 212, 170, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #8a8a9a;
            --text-muted: #5a5a6a;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(0, 212, 170, 0.3);
            --user-bubble: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --ai-bubble: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated background */
        .bg-effects {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-effects::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            animation: pulse-glow 8s ease-in-out infinite;
        }

        .bg-effects::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 168, 255, 0.2) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: pulse-glow 6s ease-in-out infinite reverse;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        /* Stars */
        .stars {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 50px 160px, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 160px 120px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1.5px 1.5px at 200px 50px, rgba(0,212,170,0.4), transparent),
                radial-gradient(1.5px 1.5px at 300px 150px, rgba(0,168,255,0.3), transparent),
                radial-gradient(1px 1px at 350px 200px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 400px 100px, rgba(255,255,255,0.3), transparent);
            background-size: 450px 250px;
            animation: twinkle 12s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Main container */
        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-header {
            padding: 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            text-align: center;
        }

        .sidebar-logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 30px var(--accent-glow);
            animation: icon-glow 3s ease-in-out infinite;
        }

        .sidebar-title {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .model-info {
            padding: 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
        }

        .model-info h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .model-detail {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .model-detail:last-child {
            border-bottom: none;
        }

        .model-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .model-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-primary);
            background: var(--bg-elevated);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-glow);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* New Chat Button */
        .new-chat-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 14px;
            color: var(--bg-deep);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px var(--accent-glow);
        }

        .new-chat-btn:active {
            transform: translateY(0);
        }

        .new-chat-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--bg-deep);
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 30px var(--accent-glow);
            animation: icon-glow 3s ease-in-out infinite;
        }

        @keyframes icon-glow {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50% { box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(0,168,255,0.2); }
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .turns-indicator {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 8px 16px;
            background: var(--bg-elevated);
            border-radius: 20px;
            border: 1px solid var(--border-subtle);
        }

        .turns-indicator span {
            color: var(--accent-primary);
            font-weight: 600;
        }

        .clear-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border-glow);
            color: var(--accent-primary);
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clear-btn:hover {
            background: var(--accent-primary);
            color: var(--bg-deep);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Chat container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 3px;
        }

        /* Messages */
        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: message-in 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes message-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--user-bubble);
            border: 1px solid rgba(0, 168, 255, 0.3);
        }

        .message.ai .message-avatar {
            background: var(--ai-bubble);
            border: 1px solid var(--border-glow);
            box-shadow: 0 0 15px rgba(0, 212, 170, 0.2);
        }

        .message-content {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: var(--user-bubble);
            border: 1px solid rgba(0, 168, 255, 0.2);
            border-bottom-right-radius: 4px;
            color: var(--text-primary);
        }

        .message.ai .message-content {
            background: var(--ai-bubble);
            border: 1px solid var(--border-subtle);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-items: flex-start;
            gap: 12px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 14px 18px;
            background: var(--ai-bubble);
            border: 1px solid var(--border-subtle);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* Input area */
        .input-container {
            padding: 16px 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            margin-top: 20px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-field {
            flex: 1;
            padding: 14px 20px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .input-field:focus {
            border-color: var(--border-glow);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.15);
        }

        .send-btn {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn svg {
            width: 22px;
            height: 22px;
            fill: var(--bg-deep);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Welcome message */
        .welcome-message {
            text-align: center;
            padding: 60px 20px;
            animation: welcome-in 0.8s ease-out forwards;
        }

        @keyframes welcome-in {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 0 60px var(--accent-glow);
            animation: welcome-glow 3s ease-in-out infinite;
        }

        @keyframes welcome-glow {
            0%, 100% { box-shadow: 0 0 40px var(--accent-glow); }
            50% { box-shadow: 0 0 80px var(--accent-glow), 0 0 100px rgba(0,168,255,0.3); }
        }

        .welcome-title {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container {
                padding: 12px;
            }

            .sidebar {
                display: none;
            }

            .header {
                padding: 12px 16px;
            }

            .logo-text {
                font-size: 20px;
            }

            .turns-indicator {
                display: none;
            }

            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="stars"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">✦</div>
                <div class="sidebar-title">AI Chat</div>
            </div>
            <div class="model-info">
                <h3>Model Settings</h3>
                <div class="model-detail">
                    <span class="model-label">Model</span>
                    <span class="model-value">{{ model_info.model }}</span>
                </div>
                <div class="model-detail">
                    <span class="model-label">Temperature</span>
                    <span class="model-value">{{ model_info.temperature }}</span>
                </div>
            </div>

            <button class="new-chat-btn" onclick="clearChat()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
                New Chat
            </button>
        </aside>

        <!-- Chat Area -->
        <div class="chat-area">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">✦</div>
                <span class="logo-text">AI Assistant</span>
            </div>
            <div class="header-actions">
                <div class="turns-indicator">Turns: <span id="turns-count">0</span>/5</div>
            </div>
        </header>

        <div class="chat-container" id="chat-container">
            <div class="welcome-message">
                <div class="welcome-icon">✨</div>
                <h1 class="welcome-title">Welcome to AI Chat</h1>
                <p class="welcome-subtitle">Start a conversation below</p>
            </div>
        </div>

        <div class="typing-indicator" id="typing-indicator">
            <div class="message-avatar">✦</div>
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" class="input-field" id="message-input" placeholder="Type your message..." autocomplete="off">
                <button class="send-btn" id="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        const turnsCount = document.getElementById('turns-count');

        let remaining = 5;

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Remove welcome message if present
            const welcomeMsg = chatContainer.querySelector('.welcome-message');
            if (welcomeMsg) {
                welcomeMsg.remove();
            }

            // Add user message
            addMessage(message, 'user');
            messageInput.value = '';

            // Show typing indicator
            typingIndicator.classList.add('active');
            chatContainer.appendChild(typingIndicator);
            scrollToBottom();
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                typingIndicator.classList.remove('active');

                // Add AI response
                addMessage(data.response, 'ai');

                // Update turns
                remaining = data.remaining;
                updateTurns();

                // Check if context is full
                if (data.context_full) {
                    messageInput.placeholder = "Context full - Click 'New Chat' to start fresh";
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                }

            } catch (error) {
                typingIndicator.classList.remove('active');
                addMessage('Error: Could not connect to the server.', 'ai');
                console.error('Error:', error);
            }

            sendBtn.disabled = false;
        }

        function addMessage(content, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const avatar = sender === 'user' ? '👤' : '✦';
            const messageContent = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">${messageContent}</div>
            `;

            // Remove typing indicator from its current position
            if (typingIndicator.parentNode) {
                typingIndicator.parentNode.removeChild(typingIndicator);
            }

            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function updateTurns() {
            const turns = 5 - remaining;
            turnsCount.textContent = turns;
        }

        async function clearChat() {
            try {
                await fetch('/api/clear', { method: 'POST' });
                chatContainer.innerHTML = `
                    <div class="welcome-message">
                        <div class="welcome-icon">✨</div>
                        <h1 class="welcome-title">Welcome to AI Chat</h1>
                        <p class="welcome-subtitle">Start a conversation below</p>
                    </div>
                `;
                remaining = 5;
                turnsCount.textContent = '0';
                messageInput.disabled = false;
                messageInput.placeholder = "Type your message...";
                sendBtn.disabled = false;
            } catch (error) {
                console.error('Error clearing chat:', error);
            }
        }
    </script>
</body>
</html>
